extends:
  - "@commitlint/config-conventional"

rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - chore
      - revert
  type-case:
    - 2
    - always
    - lowerCase
  type-empty:
    - 2
    - never
  subject-empty:
    - 2
    - never
  body-max-line-length:
    - 0
