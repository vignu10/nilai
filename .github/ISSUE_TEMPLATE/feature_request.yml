name: Feature request
description: Suggest an idea for Nilai
title: "[Feature] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature for Nilai!

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? What pain point does it address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this feature to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider? Why did you choose this one?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Feature scope
      description: Where should this live?
      options:
        - CLI commands
        - Hooks
        - Slash commands/skills
        - Session state management
        - Documentation
        - Other
    validations:
      required: false

  - type: checkboxes
    id: willingness
    attributes:
      label: Would you like to implement this?
      options:
        - label: Yes, I'd like to submit a PR
          required: false
        - label: I need guidance to implement
          required: false
        - label: No, just the suggestion
          required: false
